<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Moja Strona</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      padding: 50px;
      background: #1e293b;
    }

    h1 {
      margin: 0;
      font-size: 40px;
    }

    p {
      color: #cbd5f5;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #2563eb;
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      background: #1e293b;
      font-size: 14px;
    }
  </style>
</head>
<body>

<header>
  <h1>🚀 Moja Strona</h1>
  <p>Hostowana na GitHub Pages</p>
  <a href="#" class="btn">Kliknij mnie</a>
</header>

<footer>
  © 2026 - Zrobione przez Ciebie 😎
</footer>

</body>
</html>
